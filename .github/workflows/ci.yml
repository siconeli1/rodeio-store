name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Lint, test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
          SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
          MERCADOPAGO_ACCESS_TOKEN: ci-mercadopago-token
          NEXT_PUBLIC_MERCADOPAGO_PUBLIC_KEY: ci-mercadopago-public-key
          MERCADOPAGO_WEBHOOK_SECRET: ci-webhook-secret
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_SHIPPING_COST: 15
